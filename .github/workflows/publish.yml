name: Publish to GitHub Pages
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Demo/package-lock.json

      # Build the library locally so dist/ exists, then register it with
      # `npm link` (this is what the Demo consumes via the bare "h5dmd" import).
      - name: Build library
        run: |
          npm ci
          npm run build
          npm link

      # Generate the API documentation (TypeDoc -> docs/).
      - name: Build documentation
        run: npm run build:docs

      # Build the Vite demo against the freshly built local library.
      - name: Build demo
        working-directory: ./Demo
        run: |
          npm ci
          npm link h5dmd
          npm run build

      # Combine demo (site root) + docs (/docs) into one folder to publish.
      - name: Combine outputs
        run: |
          mkdir -p publish/docs
          cp -r Demo/dist/* publish/
          cp -r docs/* publish/docs/

      # Clone, update H5DMD folder, commit, push and open a PR
      - name: Deploy to user pages repo
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          git clone https://x-access-token:${PAGES_TOKEN}@github.com/bzhmaddog/bzhmaddog.github.io.git user-pages
          cd user-pages

          git checkout -b update-h5dmd-${{ github.sha }}

          rm -rf H5DMD
          mkdir -p H5DMD
          cp -r ../publish/* H5DMD/

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add H5DMD/
          git diff --cached --quiet || git commit -m "Deploy H5DMD docs and demo (${{ github.sha }})"
          git push origin update-h5dmd-${{ github.sha }}

          curl -X POST \
            -H "Authorization: token ${PAGES_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/bzhmaddog/bzhmaddog.github.io/pulls \
            -d '{
              "title": "Deploy H5DMD docs and demo",
              "body": "Automated deployment from bzhmaddog/H5DMD@${{ github.sha }}",
              "head": "update-h5dmd-${{ github.sha }}",
              "base": "main"
            }'