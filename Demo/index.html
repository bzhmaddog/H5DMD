<!DOCTYPE html>
<html lang="en">
<head>
    <title>H5DMD Demo</title>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/webgpu.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: black;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        span, li, label {
            color: white;
        }

        #version {
            color: white;
            font: 13px sans-serif;
            margin: 6px 0 10px;
        }

        #layer-controls {
            max-width: 1280px;
            font: 13px sans-serif;
        }

        #tab-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            border-bottom: 2px solid #6cf;
        }

        #tab-bar button {
            background: #1a1a1a;
            color: #bbb;
            border: 1px solid #333;
            border-bottom: none;
            padding: 6px 10px;
            cursor: pointer;
            font: 12px sans-serif;
            border-radius: 4px 4px 0 0;
        }

        #tab-bar button.active {
            background: #6cf;
            color: #000;
            font-weight: bold;
        }

        #tab-bar button[draggable="true"] {
            cursor: grab;
        }

        #tab-bar button.dragging {
            opacity: 0.4;
        }

        #tab-bar button.drag-over {
            border-left: 3px solid #6cf;
        }

        .tab-panel {
            display: none;
            padding: 12px;
            border: 1px solid #333;
            border-top: none;
            background: #111;
        }

        .tab-panel.active {
            display: block;
        }

        .ctl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .ctl-row label {
            min-width: 70px;
        }

        .tab-panel button {
            cursor: pointer;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 10px;
        }

        .tab-panel button:hover:not(:disabled) {
            background: #333;
        }

        .tab-panel button:disabled {
            cursor: default;
            opacity: 0.35;
        }

        .ctl-tag {
            color: #fa0;
            font: bold 11px monospace;
            margin-left: 6px;
        }

        .ctl-note {
            color: #888;
            font-size: 12px;
        }

        input[type='text'] {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 6px;
        }
    </style>
</head>
<body>
<canvas id="output" width="1280" height="390"></canvas>
<div id="version">H5DMD version: <span id="version_value">?</span></div>

<div id="layer-controls">
    <div id="tab-bar"></div>
    <div id="tab-panels"></div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
